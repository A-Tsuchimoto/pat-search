<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>特許検索式ビルダー</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <h1>特許検索式ビルダー</h1>
      <p>GUIで論理式を組み立て、J-PlatPat / Lens.org 向けの検索式へ変換。CSV入出力にも対応。</p>
    </header>

    <main>
      <section class="panel controls-panel">
        <h2>出力先データベース</h2>
        <div class="db-toggle" role="group" aria-label="出力先切り替え">
          <button id="target-jplatpat" class="target-button active" data-target="jplatpat" type="button">J-PlatPat</button>
          <button id="target-lens" class="target-button" data-target="lens" type="button">Lens.org</button>
        </div>

        <div class="action-row">
          <button id="load-sample" type="button">推奨サンプルを読み込む</button>
          <button id="add-condition" type="button">条件を追加</button>
          <button id="add-group" type="button">グループを追加</button>
          <button id="reset-query" type="button" class="danger">リセット</button>
        </div>
      </section>

      <section class="panel">
        <h2 id="guide-title">検索設計ガイド</h2>
        <ul id="guide-list" class="guide-list"></ul>
      </section>

      <section class="panel">
        <h2>検索式GUI</h2>
        <p class="hint">ルートグループの演算子を切り替え、条件や子グループを追加してください。</p>
        <div id="builder-root"></div>
      </section>

      <section class="panel">
        <h2>変換結果</h2>
        <label for="query-output">現在の出力先向け論理検索式</label>
        <textarea id="query-output" readonly rows="6"></textarea>
        <div class="action-row">
          <button id="copy-output" type="button">検索式をコピー</button>
          <span id="copy-status" aria-live="polite"></span>
        </div>
      </section>

      <section class="panel">
        <h2>CSV入出力</h2>
        <p class="hint">CSV列: id,parent_id,type,operator,field,keyword,negate</p>
        <div class="action-row">
          <button id="export-csv" type="button">CSVを書き出し</button>
          <label class="file-upload">CSVを読み込み
            <input id="import-csv" type="file" accept=".csv,text/csv" />
          </label>
        </div>
        <textarea id="csv-preview" rows="8" readonly></textarea>
      </section>
    </main>

    <template id="condition-template">
      <div class="node condition-node">
        <div class="node-header">
          <strong>条件</strong>
          <button type="button" class="remove-node danger small">削除</button>
        </div>
        <div class="condition-grid">
          <label>対象項目
            <select class="field-select"></select>
          </label>
          <label>キーワード
            <input class="keyword-input" type="text" />
          </label>
          <label class="checkbox-label">
            <input class="negate-input" type="checkbox" /> <span class="negate-label-text">除外</span>
          </label>
        </div>
      </div>
    </template>

    <template id="group-template">
      <div class="node group-node">
        <div class="node-header">
          <strong>グループ</strong>
          <div class="node-actions">
            <label>演算子
              <select class="group-operator">
                <option value="AND">AND</option>
                <option value="OR">OR</option>
              </select>
            </label>
            <button type="button" class="add-condition small">+ 条件</button>
            <button type="button" class="add-group small">+ グループ</button>
            <button type="button" class="remove-node danger small">削除</button>
          </div>
        </div>
        <div class="children"></div>
      </div>
    </template>

    <script src="app.js"></script>
  </body>
</html>
